  #     - run: cargo test

  # Uncomment once dashboard/ exists.
  # elixir:
  #   name: Elixir dashboard
  #   runs-on: ubuntu-latest
  #   defaults: { run: { working-directory: dashboard } }
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: erlef/setup-beam@v1
  #       with: { otp-version: "27", elixir-version: "1.17" }
  #     - run: mix deps.get
  #     - run: mix format --check-formatted
  #     - run: mix test

  dco:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on each commit
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          for sha in $(git rev-list "$base".."$head"); do
            if ! git log -1 --format=%B "$sha" | grep -qi '^Signed-off-by: '; then
              echo "::error::commit $sha is missing a Signed-off-by line (use git commit -s)"
              missing=1
            fi
          done
          exit $missing
