name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go build, test, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Build
        run: go build ./...
      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  # Uncomment once engine/ exists.
  # rust:
  #   name: Rust engine
  #   runs-on: ubuntu-latest
  #   defaults: { run: { working-directory: engine } }
  #   steps:
  #     - uses: actions/checkout@v4
